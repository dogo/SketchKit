name: Testing

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Test SketchKit
    runs-on: macos-26

    env:
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5
      XCODE_VERSION: "26.5"

    strategy:
      matrix:
        scheme: [
          SketchKit
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.312.0
        with:
          ruby-version: 3.3.0
          bundler-cache: true

      - name: Danger action
        uses: MeilCli/danger-action@v6.0.50
        if: github.event_name == 'pull_request'
        with:
          plugins_file: 'Gemfile'
          install_path: 'vendor/bundle'
          danger_file: 'Dangerfile'
          danger_id: 'danger-pr'
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test SwiftPM on macOS
        run: swift test

      - name: Test ${{ matrix.scheme }} on iOS Simulator
        run: |
          xcodebuild -scheme ${{ matrix.scheme }} \
            -sdk iphonesimulator \
            -destination "$IOS_DESTINATION" \
            -enableCodeCoverage YES \
            test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
          verbose: true
